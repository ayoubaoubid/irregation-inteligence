global:
  scrape_interval: 5s

rule_files:
  - alert.rules.yml

scrape_configs:
  - job_name: "ml_api"
    static_configs:
      - targets: ["model-api:5000"]

  - job_name: "back-end"
    static_configs:
      - targets: ["back-end:8000"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "nginx-exporter"
    static_configs:
      - targets: ["nginx-exporter:9113"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
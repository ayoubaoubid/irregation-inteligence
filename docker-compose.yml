services:
  back-end:
    build:
      context: ./Plateform_IA
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./Plateform_IA:/app
    environment:
      - PYTHONUNBUFFERED=1
      - SECRET_KEY=${SECRET_KEY}  # à définir dans .env
      - MODEL_API_URL=${MODEL_API_URL} # URL du service de prédiction
    env_file:
      - variables.env
    restart: unless-stopped

  model-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - PORT=5000
    restart: unless-stopped
    depends_on:
      - back-end



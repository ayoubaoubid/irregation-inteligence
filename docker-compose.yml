services:
  back-end:
    build:
      context: ./Plateform_IA
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./Plateform_IA:/app
    environment:
      - PYTHONUNBUFFERED=1
      - SECRET_KEY=devops_pipline_@12@34@56@78
      - MODEL_API_URL=http://model-api:5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  model-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      back-end:
        condition: service_healthy
      model-api:
        condition: service_healthy
    restart: unless-stopped

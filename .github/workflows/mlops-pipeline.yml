name: CI MLOps Pipeline

on:
  push:
    branches:
      - main
      - master
      - MLOps
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc pytest mlflow scikit-learn pandas numpy

      - name: Validate DVC remote configuration
        run: |
          if grep -q "../dvc-storage" .dvc/config; then
            echo "CI cannot use the local DVC remote '../dvc-storage'."
            echo "Configure a shared remote reachable from GitHub Actions, then run 'dvc push' from your machine."
            exit 1
          fi

      - name: Pull DVC data
        run: dvc pull

      - name: Check DVC pipeline status
        run: dvc status

      - name: Run DVC pipeline
        run: dvc repro

      - name: Run tests
        run: pytest tests/

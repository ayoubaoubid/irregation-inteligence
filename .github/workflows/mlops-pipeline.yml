name: CI MLOps Pipeline

on:
  push:
    branches:
      - main
      - master
      - MLOps
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc pytest mlflow scikit-learn pandas numpy

      # 🔹 Vérification pipeline DVC (SAFE)
      - name: Check DVC pipeline status
        run: dvc status
      
      - name: Pull DVC data
        run: dvc pull

      # 🔹 Tests unitaires
      - name: Run tests
        run: pytest tests/
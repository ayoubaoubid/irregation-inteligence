name: CI MLOps Pipeline

on:
  push:
    branches:
      - main
      - master
      - MLOps
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Explain local DVC mode
        run: |
          echo "DVC is configured for local-only storage in this project."
          echo "GitHub-hosted CI skips DVC pull/repro and any tests that require local model artifacts."

      - name: Run Django system checks
        run: python Plateform_IA/manage.py check

      - name: Run tests when local model artifacts are available
        run: |
          if [ -f models/best_model.pkl ] && [ -f models/features.pkl ]; then
            pytest tests/
          else
            echo "Skipping model tests because DVC-tracked model artifacts are not available in GitHub-hosted CI."
          fi

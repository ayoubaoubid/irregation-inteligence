name: CI MLOps Pipeline

on:
  push:
    branches:
      - main
      - master
      - MLOps
      - Ettaifi_Abdelkodous
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pip install "dvc[http]"

      - name: Configure DagsHub remote auth
        run: |
          dvc remote modify origin auth basic
          dvc remote modify origin user "${{ secrets.DAGSHUB_USERNAME }}"
          dvc remote modify origin password "${{ secrets.DAGSHUB_TOKEN }}"

      - name: Pull DVC data
        id: dvc_pull
        continue-on-error: true
        run: dvc pull

      - name: Explain DVC fallback
        if: steps.dvc_pull.outcome != 'success'
        run: |
          echo "DVC pull could not restore remote artifacts."
          echo "Continuing with cloud-safe checks only."

      - name: Run DVC pipeline
        if: steps.dvc_pull.outcome == 'success'
        run: dvc repro

      - name: Push DVC artifacts to DagsHub
        if: github.event_name == 'push'
        run: dvc push

      - name: Run Django system checks
        run: python Plateform_IA/manage.py check

      - name: Run tests when local model artifacts are available
        run: |
          if [ -f models/best_model.pkl ] && [ -f models/features.pkl ]; then
            pytest tests/
          else
            echo "Skipping model tests because DVC-tracked model artifacts are not available in GitHub-hosted CI."
          fi

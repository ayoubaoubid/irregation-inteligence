name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1 : Tests unitaires pytest (rapides, sans Docker)
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r Plateform_IA/requirements.txt
          pip install -r Plateform_IA/requirements-dev.txt

      - name: Run pytest
        working-directory: Plateform_IA
        run: |
          pytest --junitxml=../test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  # Job 2 : Build Docker + smoke tests
  build-and-test:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub when secrets are available
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build back-end image
        uses: docker/build-push-action@v5
        with:
          context: ./Plateform_IA
          load: true
          tags: back-end:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build model-api image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: model-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start services
        run: |
          docker compose -f docker-compose.yml up -d
          sleep 10

      - name: Smoke test - Nginx (port 80)
        run: |
          curl --fail --retry 5 --retry-delay 5 \
               --max-time 10 \
               http://localhost/ \
            && echo "Nginx -> Django : OK"

      - name: Test back-end health
        run: |
          curl --fail --retry 5 --retry-delay 5 http://localhost:8000/ || exit 1

      - name: Test model-api health
        run: |
          curl --fail --retry 5 --retry-delay 5 http://localhost:5000/ || exit 1

      - name: Show logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.yml down

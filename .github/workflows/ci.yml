name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  #  Job 1 : Tests unitaires pytest


  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r Plateform_IA/requirements.txt
          pip install -r Plateform_IA/requirements-dev.txt

      - name: Run pytest with coverage
        working-directory: Plateform_IA
        run: |
          pytest --junitxml=../test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml


  #  Job 2 : Build Docker + smoke tests

  build-and-test:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create variables.env for CI
        run: |
          echo "SECRET_KEY=devops_pipline_@12@34@56@78" >> variables.env
          echo "MODEL_API_URL=http://model-api:5000" >> variables.env
          echo "DEBUG=False" >> variables.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: construire back-end image
        uses: docker/build-push-action@v5
        with:
          context: ./Plateform_IA
          load: true
          tags: back-end:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: construire model-api image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: model-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

            # ── Démarrer les services sans healthcheck ──
      - name: Start back-end and model-api
        run: |
          docker compose up -d back-end model-api
          echo "Services started, waiting 60s for model to load..."
          sleep 60

      # ── Vérifier que les ports répondent ──
      # ── Vérifier que les ports répondent ──
      - name: attend pour back-end
        run: |
          timeout 60 bash -c '
            until curl -sf http://localhost:8000/ > /dev/null 2>&1; do
              echo "  back-end not ready..."
              sleep 5
            done
          '
          echo "back-end is ready!"
      
      - name: attend pour model-api (endpoint /docs)
        run: |
          timeout 60 bash -c '
            until curl -sf http://localhost:5000/docs > /dev/null 2>&1; do
              echo "  model-api not ready..."
              sleep 5
            done
          '
          echo "model-api is ready!"
      
      # ── Smoke tests directs ──
      - name: Smoke test - back-end direct
        run: |
          curl --fail --retry 3 --retry-delay 3 \
               --max-time 15 \
               http://localhost:8000/ \
            && echo "back-end : OK"
      
      - name: Smoke test - model-api (via /docs)
        run: |
          curl --fail --retry 3 --retry-delay 3 \
               --max-time 15 \
               http://localhost:5000/docs \
            && echo "model-api : OK"

      # ── Logs détaillés en cas d'échec ──
      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== docker compose ps ==="
          docker compose ps
          echo "=== back-end logs ==="
          docker compose logs back-end
          echo "=== model-api logs ==="
          docker compose logs model-api

      - name: Stop services
        if: always()
        run: docker compose down --volumes
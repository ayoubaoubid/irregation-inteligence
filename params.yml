models:
  LogisticRegression:
    max_iter: 2000
    C: 1.0
    solver: lbfgs

  RandomForest:
    n_estimators: 300
    max_depth: 10
    min_samples_split: 5
    min_samples_leaf: 2
    random_state: 42
    n_jobs: -1

  GradientBoosting:
    learning_rate: 0.05
    n_estimators: 200
    max_depth: 3
    subsample: 0.8
    random_state: 42

  SVM:
    C: 1.0
    kernel: rbf
    gamma: scale

  KNN:
    n_neighbors: 7
    weights: distance
    metric: minkowski

training:
  test_size: 0.2
  random_state: 42
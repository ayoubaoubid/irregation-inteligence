[pytest]
# Module de settings Django (obligatoire pour pytest-django)
DJANGO_SETTINGS_MODULE = smart_irrigation.settings

# Répertoire racine des tests
testpaths = tests

# Patterns de découverte des tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Options par défaut : verbose + coverage sur les apps
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=core
    --cov=prediction
    --cov=dataset
    --cov-report=term-missing

# Markers personnalisés
markers =
    integration: Tests d'intégration avec l'API modèle (mockée)
    views: Tests de chargement des vues
    forms: Tests de soumission de formulaires
    errors: Tests de gestion d'erreurs
